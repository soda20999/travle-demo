version: "3.8"

services:
  redis:
    image: redis:7-bookworm
    container_name: travel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: DOCKERFILE
    image: travel-app:latest
    container_name: travel-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai

volumes:
  redis_data:
