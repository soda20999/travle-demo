name: "web-app"
mode: "dev"
port: 8080
version: "v0.1.1"
start_time: "2020-07-01"
machine_id: 1

log:
  level: "debug"
  filename: "web_app.log"
  max_size: 200
  max_age: 30
  max_backups: 7

postgres:
  dsn: "postgresql://travle:travle@localhost:5432/travle?sslmode=disable"
  max_open_conns: 10
  max_idle_conns: 5
  log_level: "info"


redis:
  host: "192.168.168.128"
  port: 6379
  db: 0
  pool_size: 16
  max_retries: 0

recognizer:
  base_url: "http://localhost:8000"
